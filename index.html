<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UK Exhibitions</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f4f1eb;
  --bg-card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --accent: #c45a3c;
  --border: #e0dbd5;
  --free-bg: #e8f0e4;
  --free-text: #3a6b2a;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --radius: 10px;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
}

html { font-size: 16px; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  min-height: 100dvh; -webkit-font-smoothing: antialiased;
}

#auth-screen, #loading-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100dvh; padding: 2rem; text-align: center;
}
#auth-screen h1, #loading-screen h1 { font-family: var(--serif); font-size: 2rem; margin-bottom: 0.5rem; }
#auth-screen p { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem; }
#loading-screen p { color: var(--text-secondary); margin-top: 0.8rem; font-size: 0.85rem; }

.sign-in-btn {
  display: inline-flex; align-items: center; gap: 0.6rem;
  padding: 0.8rem 1.6rem; background: var(--text); color: #fff; border: none;
  border-radius: 50px; font-family: var(--sans); font-size: 0.95rem; font-weight: 500;
  cursor: pointer; transition: transform 0.15s, opacity 0.15s;
}
.sign-in-btn:active { transform: scale(0.97); opacity: 0.9; }
.sign-in-btn svg { width: 18px; height: 18px; }

.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-top: 1.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(244,241,235,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border); padding: 0.8rem 1rem;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
.header-top h1 { font-family: var(--serif); font-size: 1.35rem; letter-spacing: -0.01em; }
.header-actions { display: flex; align-items: center; gap: 0.5rem; }

.icon-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; border-radius: 50%; cursor: pointer;
  color: var(--text-secondary); transition: background 0.15s;
}
.icon-btn:hover { background: var(--border); }
.icon-btn svg { width: 20px; height: 20px; }

.filters {
  display: flex; gap: 0.4rem; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }

.filter-chip {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.4rem 0.75rem; border: 1.5px solid var(--border); border-radius: 50px;
  background: transparent; font-family: var(--sans); font-size: 0.8rem; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; white-space: nowrap;
  transition: all 0.15s; flex-shrink: 0;
}
.filter-chip.active { background: var(--text); color: #fff; border-color: var(--text); }
.filter-chip .chip-count {
  font-size: 0.7rem; background: rgba(0,0,0,0.08); padding: 0.1rem 0.4rem; border-radius: 50px;
}
.filter-chip.active .chip-count { background: rgba(255,255,255,0.2); }

main { padding: 0.8rem 1rem 4rem; }

.section-label {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-secondary); margin: 1.2rem 0 0.5rem;
}
.section-label:first-child { margin-top: 0.4rem; }

.card {
  background: var(--bg-card); border-radius: var(--radius); padding: 0.9rem 1rem;
  margin-bottom: 0.5rem; box-shadow: var(--shadow); display: flex; gap: 0.8rem;
  align-items: flex-start; transition: opacity 0.25s; animation: cardIn 0.3s ease both;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.card.visited { opacity: 0.55; }
.card.visited .card-title { text-decoration: line-through; text-decoration-color: #a09a94; }

.card-checkbox { flex-shrink: 0; margin-top: 0.15rem; }
.card-checkbox input { display: none; }
.card-checkbox label {
  display: flex; width: 24px; height: 24px; border: 2px solid var(--border);
  border-radius: 6px; cursor: pointer; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.card-checkbox label:active { transform: scale(0.9); }
.card-checkbox input:checked + label { background: var(--accent); border-color: var(--accent); }
.card-checkbox input:checked + label svg { opacity: 1; }
.card-checkbox label svg { width: 14px; height: 14px; opacity: 0; color: #fff; transition: opacity 0.15s; }

.card-body { flex: 1; min-width: 0; }
.card-actions { flex-shrink: 0; margin-top: 0.15rem; }
.card-actions button {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; border-radius: 50%; cursor: pointer;
  color: var(--border); transition: color 0.15s, background 0.15s;
}
.card-actions button:hover { color: var(--text-secondary); background: rgba(0,0,0,0.04); }
.card-actions button:active { transform: scale(0.9); }
.card-actions button svg { width: 16px; height: 16px; }
.card.hidden-card { opacity: 0.4; }
.card.hidden-card .card-title { text-decoration: line-through; text-decoration-color: #a09a94; }
.card-museum {
  font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.04em; color: var(--text-secondary); margin-bottom: 0.15rem;
}
.card-title { font-family: var(--serif); font-size: 1.05rem; line-height: 1.3; margin-bottom: 0.3rem; }
.card-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.card-dates { font-size: 0.78rem; color: var(--text-secondary); }

.card-badge {
  display: inline-block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.03em; padding: 0.15rem 0.45rem; border-radius: 4px;
}
.card-badge.free { background: var(--free-bg); color: var(--free-text); }
.card-badge.ending-soon { background: #fef3e7; color: #b5711a; }
.card-badge.opens-soon { background: #e8ecf4; color: #3a5499; }

.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
.empty-state p { font-size: 0.95rem; }

.toast {
  position: fixed; bottom: 3.5rem; left: 50%; transform: translateX(-50%) translateY(100%);
  background: var(--text); color: #fff; padding: 0.6rem 1.2rem;
  border-radius: 50px; font-size: 0.82rem; font-weight: 500;
  z-index: 150; opacity: 0; transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
  white-space: nowrap; max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.sync-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(244,241,235,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); padding: 0.5rem 1rem;
  font-size: 0.75rem; color: var(--text-secondary); z-index: 100;
}
.sync-bar-inner { display: flex; align-items: center; justify-content: space-between; }
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #6cbf5a;
  display: inline-block; margin-right: 0.4rem; vertical-align: middle;
}
.sync-dot.error { background: var(--accent); }
.sync-dot.syncing { background: #e8b44a; animation: pulse 1s ease infinite; }
@keyframes pulse { 50% { opacity: 0.4; } }

@media (min-width: 600px) {
  header, main { max-width: 560px; margin-left: auto; margin-right: auto; }
  .sync-bar-inner { max-width: 560px; margin: 0 auto; }
}
</style>
</head>
<body>

<div id="auth-screen">
  <h1>UK Exhibitions</h1>
  <p>Track current &amp; upcoming exhibitions<br>across UK museums</p>
  <button class="sign-in-btn" onclick="handleSignIn()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
    Sign in with Google
  </button>
</div>

<div id="loading-screen" style="display:none">
  <h1>UK Exhibitions</h1>
  <div class="spinner"></div>
  <p id="loading-text">Loading\u2026</p>
</div>

<div id="app" style="display:none">
  <header>
    <div class="header-top">
      <h1>UK Exhibitions</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="refreshData()" title="Refresh" id="refresh-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
        </button>
        <button class="icon-btn" onclick="handleSignOut()" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
    </div>
    <div class="filters" id="filters"></div>
  </header>
  <main id="exhibition-list"></main>
  <div class="sync-bar">
    <div class="sync-bar-inner">
      <span><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Synced</span></span>
      <span id="file-info"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ───
const CLIENT_ID = '254726805331-s8n400uimdiqioij2m3v0h22523csr11.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/spreadsheets.readonly';
const REDIRECT_URI = location.origin + location.pathname;
const DRIVE_FOLDER_NAME = 'ukexhibitions';
const IMPORT_SHEET_NAME = 'ukexhibitions';
const DB_FILENAME = 'exhibitions_db.json';

// ─── State ───
let accessToken = null;
let db = [];            // cumulative DB: [{Museum, Exhibition, FromDate, ToDate, "Free?", visited}, ...]
let dbFileId = null;
let displayList = [];   // processed for display (filtered, sorted, active only)
let activeFilter = 'not-visited';
let saveTimeout = null;
let lastImportInfo = '';

// ─── Auth ───
function handleSignIn() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID, redirect_uri: REDIRECT_URI,
    response_type: 'token', scope: SCOPES, prompt: 'consent'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}
function handleSignOut() {
  accessToken = null;
  localStorage.removeItem('ukex_token');
  localStorage.removeItem('ukex_token_exp');
  show('auth-screen');
}
function parseHashToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const expiresIn = params.get('expires_in');
  if (token) {
    accessToken = token;
    localStorage.setItem('ukex_token', token);
    localStorage.setItem('ukex_token_exp', Date.now() + parseInt(expiresIn) * 1000);
    history.replaceState(null, '', window.location.pathname);
    return true;
  }
  return false;
}
function checkStoredToken() {
  const token = localStorage.getItem('ukex_token');
  const exp = localStorage.getItem('ukex_token_exp');
  if (token && exp && Date.now() < parseInt(exp)) { accessToken = token; return true; }
  return false;
}

// ─── Drive helpers ───
async function driveApi(path, opts = {}) {
  const res = await fetch('https://www.googleapis.com/drive/v3/' + path, {
    ...opts,
    headers: { Authorization: 'Bearer ' + accessToken, ...(opts.headers || {}) }
  });
  if (res.status === 401) { handleSignOut(); throw new Error('Auth expired'); }
  if (!res.ok) throw new Error('Drive API ' + res.status + ': ' + (await res.text()));
  return res;
}
async function driveJson(path, opts) { return (await driveApi(path, opts)).json(); }

let _folderId = null;
async function getOrCreateFolder() {
  if (_folderId) return _folderId;
  const q = "name='" + DRIVE_FOLDER_NAME + "' and mimeType='application/vnd.google-apps.folder' and trashed=false";
  const folders = await driveJson('files?' + new URLSearchParams({ q, fields: 'files(id)', spaces: 'drive' }));
  if (folders.files && folders.files.length > 0) { _folderId = folders.files[0].id; return _folderId; }
  const res = await driveApi('files', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: DRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  _folderId = (await res.json()).id;
  return _folderId;
}

// ─── DB: exhibitions_db.json in appDataFolder ───

// Museum name normalization map
const MUSEUM_ALIASES = {
  'barbican': 'Barbican',
  'barbican centre': 'Barbican',
  'barbican art gallery': 'Barbican',
  'barbican gallery': 'Barbican',
  'v&a': 'V&A South Kensington',
  'v&a south kensington': 'V&A South Kensington',
  'victoria and albert museum': 'V&A South Kensington',
  'v&a east': 'V&A East Museum',
  'v&a east museum': 'V&A East Museum',
  'v&a east storehouse': 'V&A East Storehouse',
  'young v&a': 'Young V&A',
  'tate modern': 'Tate Modern',
  'tate britain': 'Tate Britain',
  'tate': 'Tate Modern',
  'national gallery': 'National Gallery',
  'the national gallery': 'National Gallery',
  'national gallery london': 'National Gallery',
  'national portrait gallery': 'National Portrait Gallery',
  'npg': 'National Portrait Gallery',
  'british museum': 'British Museum',
  'the british museum': 'British Museum',
  'science museum': 'Science Museum',
  'natural history museum': 'Natural History Museum',
  'nhm': 'Natural History Museum',
  'the king\'s gallery': 'The King\'s Gallery',
  'king\'s gallery': 'The King\'s Gallery',
  'kings gallery': 'The King\'s Gallery',
  'the queen\'s gallery': 'The King\'s Gallery',
  'queen\'s gallery': 'The King\'s Gallery',
  'queens gallery': 'The King\'s Gallery',
  'royal academy': 'Royal Academy',
  'royal academy of arts': 'Royal Academy',
  'ra': 'Royal Academy',
  'hayward gallery': 'Hayward Gallery',
  'design museum': 'Design Museum',
  'the design museum': 'Design Museum',
  'serpentine': 'Serpentine',
  'serpentine gallery': 'Serpentine',
  'serpentine galleries': 'Serpentine',
  'serpentine north': 'Serpentine North Gallery',
  'serpentine north gallery': 'Serpentine North Gallery',
  'serpentine south': 'Serpentine South Gallery',
  'serpentine south gallery': 'Serpentine South Gallery',
  'whitechapel gallery': 'Whitechapel Gallery',
  'whitechapel': 'Whitechapel Gallery',
  'wellcome collection': 'Wellcome Collection',
  'wellcome': 'Wellcome Collection',
  'courtauld gallery': 'Courtauld Gallery',
  'the courtauld': 'Courtauld Gallery',
  'courtauld': 'Courtauld Gallery',
  'dulwich picture gallery': 'Dulwich Picture Gallery',
  'dulwich': 'Dulwich Picture Gallery',
  'wallace collection': 'Wallace Collection',
  'the wallace collection': 'Wallace Collection',
  'ica': 'ICA',
  'institute of contemporary arts': 'ICA',
  'saatchi gallery': 'Saatchi Gallery',
  'saatchi': 'Saatchi Gallery',
  'photographers\' gallery': 'Photographers\' Gallery',
  'the photographers\' gallery': 'Photographers\' Gallery',
  'photographers gallery': 'Photographers\' Gallery',
};

function normalizeMuseum(name) {
  const lookup = name.trim().toLowerCase();
  return MUSEUM_ALIASES[lookup] || name.trim();
}

// Normalize text for fuzzy comparison: strip trailing parenthetical (artist name),
// lowercase, strip punctuation, collapse spaces
function normalizeText(s) {
  return s.replace(/\s*\([^)]*\)\s*$/, '').toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
}

function makeKey(ex) {
  return normalizeMuseum(ex.Museum) + '::' + normalizeText(ex.Exhibition);
}

// Display-friendly key (uses normalized museum but original exhibition name)
function makeDisplayMuseum(ex) {
  return normalizeMuseum(ex.Museum);
}

async function loadDb() {
  try {
    const q = "name='" + DB_FILENAME + "' and trashed=false";
    const result = await driveJson('files?' + new URLSearchParams({ q, spaces: 'appDataFolder', fields: 'files(id)' }));
    if (result.files && result.files.length > 0) {
      dbFileId = result.files[0].id;
      const content = await driveApi('files/' + dbFileId + '?alt=media');
      return await content.json();
    }
  } catch (e) { console.warn('Could not load DB:', e); }
  return [];
}

async function saveDb() {
  setSyncStatus('syncing');
  try {
    const body = JSON.stringify(db);
    if (dbFileId) {
      await fetch('https://www.googleapis.com/upload/drive/v3/files/' + dbFileId + '?uploadType=media', {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body
      });
    } else {
      const metadata = { name: DB_FILENAME, parents: ['appDataFolder'], mimeType: 'application/json' };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', new Blob([body], { type: 'application/json' }));
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form
      });
      dbFileId = (await res.json()).id;
    }
    setSyncStatus('ok');
  } catch (e) { console.error('Save DB failed:', e); setSyncStatus('error'); }
}

function debouncedSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveDb, 600); }

// ─── Deduplicate existing DB entries using normalized keys ───
function deduplicateDb() {
  const seen = new Map();
  let changed = false;

  db.forEach(ex => {
    // Normalize museum name
    const normMuseum = normalizeMuseum(ex.Museum);
    if (normMuseum !== ex.Museum) { ex.Museum = normMuseum; changed = true; }
    // Ensure hidden field exists
    if (ex.hidden === undefined) { ex.hidden = false; changed = true; }

    const key = makeKey(ex);
    const existing = seen.get(key);
    if (existing) {
      // Merge: keep visited/hidden if either had it, use latest dates, keep longer name
      if (ex.visited) existing.visited = true;
      if (ex.hidden) existing.hidden = true;
      if (ex.ToDate > existing.ToDate) { existing.FromDate = ex.FromDate; existing.ToDate = ex.ToDate; }
      if (ex.Exhibition.length > existing.Exhibition.length) existing.Exhibition = ex.Exhibition;
      changed = true;
    } else {
      seen.set(key, ex);
    }
  });

  // Second pass: prefix matching for same dates
  const entries = Array.from(seen.values());
  const toRemove = new Set();

  for (let i = 0; i < entries.length; i++) {
    if (toRemove.has(i)) continue;
    for (let j = i + 1; j < entries.length; j++) {
      if (toRemove.has(j)) continue;
      const a = entries[i], b = entries[j];
      if (a.FromDate !== b.FromDate || a.ToDate !== b.ToDate) continue;

      const ma = normalizeMuseum(a.Museum).toLowerCase();
      const mb = normalizeMuseum(b.Museum).toLowerCase();
      const na = normalizeText(a.Exhibition);
      const nb = normalizeText(b.Exhibition);

      let match = false;

      // Case 1: Same museum, exhibition name prefix
      if (ma === mb && (na.startsWith(nb) || nb.startsWith(na))) match = true;

      // Case 2: Same exhibition, museum name prefix (e.g. "Serpentine" vs "Serpentine South Gallery")
      if (na === nb && (ma.startsWith(mb) || mb.startsWith(ma))) match = true;

      if (match) {
        // Merge j into i — keep longer/more specific names
        if (b.Exhibition.length > a.Exhibition.length) a.Exhibition = b.Exhibition;
        if (b.Museum.length > a.Museum.length) a.Museum = b.Museum;
        if (b.visited) a.visited = true;
        if (b.hidden) a.hidden = true;
        toRemove.add(j);
        changed = true;
      }
    }
  }

  if (changed) {
    db = entries.filter((_, i) => !toRemove.has(i));
  }
  return changed;
}

// ─── Merge: upsert new sheet data into DB ───
function mergeIntoDb(newExhibitions) {
  const dbMap = new Map();
  db.forEach(ex => dbMap.set(makeKey(ex), ex));

  let added = 0, updated = 0;
  newExhibitions.forEach(ex => {
    const key = makeKey(ex);
    const normMuseum = normalizeMuseum(ex.Museum);
    const normExName = normalizeText(ex.Exhibition);

    // Try exact key match first
    let existing = dbMap.get(key);

    // Fallback: prefix match on exhibition name (same museum, same dates)
    // or prefix match on museum name (same exhibition, same dates)
    if (!existing) {
      const normMuseumLower = normMuseum.toLowerCase();
      for (const dbEx of dbMap.values()) {
        if (dbEx.FromDate !== ex.FromDate || dbEx.ToDate !== ex.ToDate) continue;
        const dbMuseum = normalizeMuseum(dbEx.Museum).toLowerCase();
        const dbNorm = normalizeText(dbEx.Exhibition);

        // Case 1: same museum, exhibition name prefix
        if (dbMuseum === normMuseumLower && (dbNorm.startsWith(normExName) || normExName.startsWith(dbNorm))) {
          existing = dbEx;
          break;
        }
        // Case 2: same exhibition, museum name prefix
        if (dbNorm === normExName && (dbMuseum.startsWith(normMuseumLower) || normMuseumLower.startsWith(dbMuseum))) {
          existing = dbEx;
          break;
        }
      }
    }

    if (existing) {
      // Update dates and free status, preserve visited/hidden
      if (existing.FromDate !== ex.FromDate || existing.ToDate !== ex.ToDate || existing['Free?'] !== ex['Free?']) {
        existing.FromDate = ex.FromDate;
        existing.ToDate = ex.ToDate;
        existing['Free?'] = ex['Free?'];
        updated++;
      }
      existing.Museum = normMuseum.length > existing.Museum.length ? normMuseum : existing.Museum;
      // Keep the longer (more descriptive) exhibition name
      if (ex.Exhibition.trim().length > existing.Exhibition.length) {
        existing.Exhibition = ex.Exhibition.trim();
      }
    } else {
      // New exhibition — store with normalized museum name
      dbMap.set(key, {
        Museum: normMuseum,
        Exhibition: ex.Exhibition.trim(),
        FromDate: ex.FromDate,
        ToDate: ex.ToDate,
        'Free?': ex['Free?'],
        visited: false,
        hidden: false
      });
      added++;
    }
  });

  db = Array.from(dbMap.values());
  return { added, updated };
}

// ─── Read sheet data via Sheets API ───
async function readSheetData(sheetId) {
  const sheetsRes = await fetch(
    'https://sheets.googleapis.com/v4/spreadsheets/' + sheetId + '/values/A:E?valueRenderOption=FORMATTED_VALUE',
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  if (sheetsRes.status === 401) { handleSignOut(); throw new Error('Auth expired'); }
  if (!sheetsRes.ok) throw new Error('Sheets API ' + sheetsRes.status);
  const sheetsData = await sheetsRes.json();
  const rows = sheetsData.values || [];
  if (rows.length < 2) return [];

  const headers = rows[0];
  const hIdx = {};
  headers.forEach((h, i) => { hIdx[h.trim()] = i; });

  const required = ['FromDate', 'ToDate', 'Museum', 'Exhibition'];
  const missing = required.filter(c => hIdx[c] === undefined);
  if (missing.length > 0) throw new Error('Missing columns: ' + missing.join(', '));

  return rows.slice(1).filter(r => r.length >= 4).map(r => {
    const free = (r[hIdx['Free?']] || '').toString();
    return {
      FromDate: (r[hIdx['FromDate']] || '').trim(),
      ToDate: (r[hIdx['ToDate']] || '').trim(),
      'Free?': free === 'TRUE' || free === 'true' || free === 'Yes' || free === 'yes',
      Museum: (r[hIdx['Museum']] || '').trim(),
      Exhibition: (r[hIdx['Exhibition']] || '').trim()
    };
  });
}

// ─── Auto-import: scan, merge, move ───
async function autoImport() {
  const folderId = await getOrCreateFolder();
  const q = "name='" + IMPORT_SHEET_NAME + "' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false and not '" + folderId + "' in parents";
  const result = await driveJson('files?' + new URLSearchParams({
    q, fields: 'files(id,name,parents,modifiedTime)', orderBy: 'modifiedTime desc',
    pageSize: '5', spaces: 'drive'
  }));

  if (!result.files || result.files.length === 0) return false;

  let totalAdded = 0, totalUpdated = 0, imported = 0;

  for (const file of result.files) {
    try {
      const newData = await readSheetData(file.id);
      const { added, updated } = mergeIntoDb(newData);
      totalAdded += added;
      totalUpdated += updated;

      // Rename + move to archive folder
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const newName = 'exhibitions_' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) +
        (imported > 0 ? '_' + pad(now.getHours()) + pad(now.getMinutes()) : '');
      const oldParents = (file.parents || []).join(',');
      const params = new URLSearchParams({ addParents: folderId });
      if (oldParents) params.set('removeParents', oldParents);
      await driveApi('files/' + file.id + '?' + params, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName })
      });

      lastImportInfo = newName;
      imported++;
    } catch (e) { console.warn('Skipped sheet ' + file.name + ':', e.message); }
  }

  if (imported > 0) {
    await saveDb();
    const parts = [];
    if (totalAdded > 0) parts.push(totalAdded + ' new');
    if (totalUpdated > 0) parts.push(totalUpdated + ' updated');
    showToast('Imported: ' + (parts.length > 0 ? parts.join(', ') : 'no changes'));
  }
  return imported > 0;
}

// ─── Processing for display ───
function today() { return new Date().toISOString().slice(0, 10); }

function processForDisplay() {
  const t = today();
  displayList = db
    .filter(ex => ex.ToDate >= t && ex.FromDate && ex.ToDate)
    .map(ex => ({ ...ex, started: ex.FromDate <= t, key: makeKey(ex) }))
    .sort((a, b) => {
      if (a.started && !b.started) return -1;
      if (!a.started && b.started) return 1;
      if (a.started && b.started) return a.ToDate.localeCompare(b.ToDate);
      return a.FromDate.localeCompare(b.FromDate);
    });
}

function getFiltered() {
  let list = displayList;
  if (activeFilter === 'hidden') return list.filter(e => e.hidden);
  // All other filters exclude hidden
  list = list.filter(e => !e.hidden);
  if (activeFilter === 'free') list = list.filter(e => e['Free?']);
  if (activeFilter === 'visited') list = list.filter(e => e.visited);
  if (activeFilter === 'not-visited') list = list.filter(e => !e.visited);
  return list;
}

// ─── Rendering ───
function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function daysUntil(d) {
  return Math.round((new Date(d + 'T00:00:00') - new Date(today() + 'T00:00:00')) / 86400000);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderFilters() {
  const active = displayList.filter(e => !e.hidden);
  const total = active.length;
  const freeCount = active.filter(e => e['Free?']).length;
  const visitedCount = active.filter(e => e.visited).length;
  const hiddenCount = displayList.filter(e => e.hidden).length;
  const chips = [
    { id: 'all', label: 'All', count: total },
    { id: 'free', label: 'Free', count: freeCount },
    { id: 'not-visited', label: 'To Visit', count: total - visitedCount },
    { id: 'visited', label: 'Visited', count: visitedCount },
  ];
  if (hiddenCount > 0) chips.push({ id: 'hidden', label: 'Hidden', count: hiddenCount });
  document.getElementById('filters').innerHTML = chips.map(c =>
    '<button class="filter-chip ' + (activeFilter === c.id ? 'active' : '') + '" onclick="setFilter(\'' + c.id + '\')">' +
      c.label + ' <span class="chip-count">' + c.count + '</span></button>'
  ).join('');
}

function renderCard(ex, delay) {
  const dEnd = daysUntil(ex.ToDate);
  const dStart = daysUntil(ex.FromDate);
  const safeKey = ex.key.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  const id = 'cb' + Math.random().toString(36).slice(2, 10);
  let badges = '';
  if (ex['Free?']) badges += '<span class="card-badge free">Free</span>';
  if (ex.started && dEnd <= 14) badges += '<span class="card-badge ending-soon">Ends in ' + dEnd + 'd</span>';
  if (!ex.started && dStart <= 14) badges += '<span class="card-badge opens-soon">Opens in ' + dStart + 'd</span>';

  const isHiddenView = activeFilter === 'hidden';
  const cardClass = isHiddenView ? 'card hidden-card' : 'card' + (ex.visited ? ' visited' : '');

  // Restore button for hidden view, bin button for normal view
  const actionBtn = isHiddenView
    ? '<div class="card-actions"><button onclick="toggleHidden(\'' + safeKey + '\',false)" title="Restore">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1014.85-3.36L23 10"/></svg></button></div>'
    : '<div class="card-actions"><button onclick="toggleHidden(\'' + safeKey + '\',true)" title="Hide">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>';

  // Hide checkbox in hidden view
  const checkbox = isHiddenView ? '' :
    '<div class="card-checkbox"><input type="checkbox" id="' + id + '" ' + (ex.visited ? 'checked' : '') +
    ' onchange="toggleVisited(\'' + safeKey + '\',this.checked)"><label for="' + id + '">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></label></div>';

  return '<div class="' + cardClass + '" style="animation-delay:' + delay + 'ms">' +
    checkbox +
    '<div class="card-body"><div class="card-museum">' + esc(ex.Museum) + '</div>' +
    '<div class="card-title">' + esc(ex.Exhibition) + '</div>' +
    '<div class="card-meta"><span class="card-dates">' + fmtDate(ex.FromDate) + ' \u2014 ' + fmtDate(ex.ToDate) + '</span>' + badges + '</div></div>' +
    actionBtn + '</div>';
}

function renderList() {
  const list = getFiltered();
  const el = document.getElementById('exhibition-list');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>No exhibitions match this filter</p></div>';
    return;
  }
  const started = list.filter(e => e.started);
  const upcoming = list.filter(e => !e.started);
  let html = '', i = 0;
  if (started.length > 0) {
    html += '<div class="section-label">Now Showing \u00b7 ' + started.length + '</div>';
    started.forEach(ex => { html += renderCard(ex, i * 35); i++; });
  }
  if (upcoming.length > 0) {
    html += '<div class="section-label">Coming Soon \u00b7 ' + upcoming.length + '</div>';
    upcoming.forEach(ex => { html += renderCard(ex, i * 35); i++; });
  }
  el.innerHTML = html;
}

function renderAll() { processForDisplay(); renderFilters(); renderList(); }

// ─── Interactions ───
function setFilter(f) { activeFilter = f; renderFilters(); renderList(); }

function toggleVisited(key, checked) {
  const entry = db.find(ex => makeKey(ex) === key);
  if (entry) entry.visited = checked;
  renderAll();
  debouncedSave();
}

function toggleHidden(key, hidden) {
  const entry = db.find(ex => makeKey(ex) === key);
  if (entry) entry.hidden = hidden;
  renderAll();
  debouncedSave();
  showToast(hidden ? 'Exhibition hidden' : 'Exhibition restored');
}

// ─── UI helpers ───
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  dot.className = 'sync-dot' + (status === 'error' ? ' error' : status === 'syncing' ? ' syncing' : '');
  text.textContent = status === 'ok' ? 'Synced' : status === 'syncing' ? 'Syncing\u2026' : 'Sync error';
}
function updateFileInfo() {
  const el = document.getElementById('file-info');
  el.textContent = db.length + ' exhibitions in DB';
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
function setLoadingText(msg) { const el = document.getElementById('loading-text'); if (el) el.textContent = msg; }
function show(id) {
  ['auth-screen', 'loading-screen', 'app'].forEach(s => {
    document.getElementById(s).style.display = s === id ? '' : 'none';
  });
}

// ─── Refresh ───
async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.style.pointerEvents = 'none';
  btn.querySelector('svg').style.animation = 'spin 0.7s linear infinite';
  try {
    setSyncStatus('syncing');
    await autoImport();
    renderAll(); updateFileInfo(); setSyncStatus('ok');
  } catch (e) {
    console.error('Refresh failed:', e);
    setSyncStatus('error');
  }
  btn.style.pointerEvents = '';
  btn.querySelector('svg').style.animation = '';
}

// ─── Init ───
async function init() {
  if (parseHashToken()) { await bootstrap(); return; }
  if (checkStoredToken()) { await bootstrap(); return; }
  show('auth-screen');
}

async function bootstrap() {
  show('loading-screen');
  try {
    setLoadingText('Loading database\u2026');
    db = await loadDb();

    // Migrate: normalize museum names and deduplicate
    let migrated = deduplicateDb();

    setLoadingText('Scanning for new sheets\u2026');
    await autoImport();

    // Save if migration changed anything
    if (migrated) await saveDb();

    show('app');
    renderAll();
    updateFileInfo();
    setSyncStatus('ok');

    if (db.length === 0) {
      document.getElementById('exhibition-list').innerHTML =
        '<div class="empty-state"><p>No exhibition data yet</p>' +
        '<p style="margin-top:0.3rem;font-size:0.85rem;color:var(--text-secondary)">Ask Gemini to create a sheet called <strong>ukexhibitions</strong></p></div>';
    }
  } catch (e) {
    console.error('Bootstrap failed:', e);
    if (e.message.includes('Auth expired') || e.message.includes('401')) {
      handleSignOut();
    } else {
      show('app');
      document.getElementById('exhibition-list').innerHTML =
        '<div class="empty-state"><p>' + esc(e.message) + '</p>' +
        '<p style="margin-top:0.5rem"><button class="sign-in-btn" onclick="refreshData()">Retry</button></p></div>';
      setSyncStatus('error');
    }
  }
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
init();
</script>
